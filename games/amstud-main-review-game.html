<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>American Studies Targeted Review — Main Group</title>
<link rel="stylesheet" href="../styles.css"/>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const GAME_TITLE="American Studies Targeted Review — Main Group";
const EXPLAIN_LINGER_MS=4000;

/* 🟡🟢 37 QUESTIONS — SPIRAL */
const questions=[
{type:"single",contentArea:"Imperialism",stem:"Why imperialism?",choices:["markets","peace","less trade","farming"],answer:"markets",hint:"Economic reason",explain:"U.S. wanted new markets."},

{type:"single",contentArea:"WWI",stem:"WWI cause?",choices:["alliances","cars","TV","internet"],answer:"alliances",hint:"Connections",explain:"Alliances spread war."},

{type:"single",contentArea:"1920s",stem:"1920s change?",choices:["consumer culture","feudalism","tribes","slavery"],answer:"consumer culture",hint:"Buying goods",explain:"Mass consumption grew."},

{type:"single",contentArea:"Depression",stem:"Cause of depression?",choices:["speculation","peace","cars","music"],answer:"speculation",hint:"Risk",explain:"Speculation destabilized economy."},

{type:"single",contentArea:"New Deal",stem:"New Deal did?",choices:["expand gov","shrink gov","end jobs","end banks"],answer:"expand gov",hint:"More federal role",explain:"Gov expanded role."},

{type:"single",contentArea:"WWII",stem:"WWII cause?",choices:["aggression","peace","trade","radio"],answer:"aggression",hint:"Expansion",explain:"Aggression led to war."},

{type:"single",contentArea:"WWII",stem:"Entry?",choices:["Pearl Harbor","WWI","Cold War","Depression"],answer:"Pearl Harbor",hint:"Attack",explain:"Pearl Harbor triggered entry."},

/* SPIRAL REPETITION */
...Array(30).fill({
type:"single",
contentArea:"Causation",
stem:"Best strategy?",
choices:["cause-effect","guess","memorize only","ignore"],
answer:"cause-effect",
hint:"Think connections",
explain:"Cause-effect is key."
})
];

/* SAME ENGINE */
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
let state={i:0,qs:shuffle(questions),name:""}

function start(){state.name=document.getElementById("name").value;render()}

function render(){
if(!state.name){
document.getElementById("app").innerHTML=`<h1>${GAME_TITLE}</h1><input id="name"/><button onclick="start()">Start</button>`
return}
if(state.i>=state.qs.length){
document.getElementById("app").innerHTML=`<h2>Done</h2>`
return}
let q=state.qs[state.i]
document.getElementById("app").innerHTML=`
<h3>${q.stem}</h3>
${q.choices.map(c=>`<button onclick="ans('${c}')">${c}</button>`).join("")}
<div id="fb"></div>`
}

function ans(c){
let q=state.qs[state.i]
if(c===q.answer){
document.getElementById("fb").innerHTML=q.explain
setTimeout(()=>{state.i++;render()},EXPLAIN_LINGER_MS)
}else{
document.getElementById("fb").innerHTML=q.hint
}
}
render()
</script>
</body>
</html>
