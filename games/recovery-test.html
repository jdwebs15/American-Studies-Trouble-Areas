<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recovery Test — Trouble Areas Assessment</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .test-shell{max-width:1100px;margin:0 auto}
    .panel-card,.question-block,.ticket,.summary-block,.launch-card{
      background:var(--panel,#161b22);
      border:1px solid var(--line,#2b3440);
      border-radius:18px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.18);
    }
    .meta-grid,.ticket-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:12px;
      margin-top:16px;
    }
    .meta-card,.ticket-cell{
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.03);
      border:1px solid var(--line,#2b3440);
    }
    .meta-label,.ticket-cell .label{
      font-size:.8rem;
      color:var(--muted,#9aa4b2);
      margin-bottom:6px;
    }
    .meta-value,.ticket-cell .value{
      font-size:1.05rem;
      font-weight:700;
    }
    .launch-grid{
      display:grid;
      gap:16px;
      margin-top:20px;
    }
    .student-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:end;
      margin-top:16px;
    }
    .student-row input{
      width:100%;
      padding:14px 16px;
      border-radius:12px;
      border:1px solid var(--line,#2b3440);
      background:#0f141a;
      color:#fff;
      font-size:1rem;
      outline:none;
    }
    .student-row input:focus{
      border-color:#4c8bf5;
      box-shadow:0 0 0 3px rgba(76,139,245,.18);
    }
    .test-list{
      display:grid;
      gap:16px;
      margin-top:22px;
    }
    .question-number{
      font-size:.9rem;
      color:var(--muted,#9aa4b2);
      margin-bottom:8px;
    }
    .question-stem{
      font-size:1.05rem;
      font-weight:700;
      line-height:1.42;
      margin-bottom:10px;
    }
    .question-help{
      font-size:.9rem;
      color:var(--muted,#9aa4b2);
      margin-bottom:12px;
    }
    .choice-list{
      display:grid;
      gap:10px;
    }
    .choice-row{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:12px 14px;
      border:1px solid var(--line,#2b3440);
      border-radius:12px;
      background:rgba(255,255,255,.02);
    }
    .choice-row input{
      margin-top:3px;
      transform:scale(1.1);
    }
    .choice-row.correct-outline{border-color:#1f8f55}
    .choice-row.incorrect-outline{border-color:#b64242}
    .submit-bar{
      position:sticky;
      bottom:12px;
      z-index:30;
      margin-top:24px;
    }
    .submit-panel{
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:center;
      padding:14px 16px;
      border-radius:18px;
      background:rgba(10,14,20,.95);
      border:1px solid var(--line,#2b3440);
      backdrop-filter:blur(8px);
    }
    .submit-panel .left{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }
    .mini-pill{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line,#2b3440);
      background:rgba(255,255,255,.03);
      font-size:.9rem;
    }
    .ticket{
      margin-top:24px;
    }
    .ticket h2{
      margin:0 0 12px 0;
    }
    .status-good{
      color:#7ee2a8;
      font-weight:700;
    }
    .score-big{
      font-size:2rem;
      font-weight:800;
      line-height:1;
    }
    .summary-line{
      font-size:1rem;
      color:var(--muted,#9aa4b2);
      margin-top:4px;
    }
    .missed-review{
      display:grid;
      gap:12px;
      margin-top:18px;
    }
    .missed-item{
      padding:14px 16px;
      border-radius:14px;
      border:1px solid var(--line,#2b3440);
      background:rgba(255,255,255,.02);
    }
    .hidden{display:none}
    .small-note{
      font-size:.92rem;
      color:var(--muted,#9aa4b2);
    }
    .warn{
      color:#ffd479;
      font-weight:700;
    }
    @media (max-width:760px){
      .student-row{grid-template-columns:1fr}
      .submit-panel{flex-direction:column;align-items:stretch}

</head>

const app = document.getElementById("app");

function esc(str){
  return String(str).replace(/[&<>"]/g, s => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    "\"":"&quot;"
  }[s]));
}

function formatDate(d){
  return d.toLocaleDateString(undefined, {
    year: "numeric",
    month: "long",
    day: "numeric"
  });
}

function formatTime(d){
  return d.toLocaleTimeString(undefined, {
    hour: "numeric",
    minute: "2-digit",
    second: "2-digit"
  });
}

function formatElapsed(totalSeconds){
  const h = Math.floor(totalSeconds / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = totalSeconds % 60;
  if(h > 0){
    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  }
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function getAttemptCount(){
  const raw = localStorage.getItem(TEST_KEY);
  return raw ? Number(raw) || 0 : 0;
}

function incrementAttemptCount(){
  const next = getAttemptCount() + 1;
  localStorage.setItem(TEST_KEY, String(next));
  return next;
}

function beginTest(){
  const input = document.getElementById("studentName");
  const name = input.value.trim();
  if(!name){
    input.focus();
    return;
  }

  const now = new Date();
  state.started = true;
  state.studentName = name;
  state.attemptNumber = incrementAttemptCount();
  state.dateStamp = formatDate(now);
  state.startTimeStamp = formatTime(now);
  state.startEpoch = Date.now();
  state.elapsedSeconds = 0;
  state.submitted = false;

  if(state.timerInterval){
    clearInterval(state.timerInterval);
  }

  state.timerInterval = setInterval(() => {
    state.elapsedSeconds = Math.floor((Date.now() - state.startEpoch) / 1000);
    const el = document.getElementById("liveTimer");
    if(el) el.textContent = formatElapsed(state.elapsedSeconds);
  }, 1000);

  renderTest();
}

function renderTest(){

      <label class="choice-row" id="row_${idx}_${cidx}">
        <input type="${type}" name="${name}" value="${esc(choice)}">
        <span>${esc(choice)}</span>
      </label>
    `).join("");

    return `
      <section class="question-block" data-qindex="${idx}">
        <div class="question-number">Question ${idx + 1} of ${questions.length}</div>
        <div class="question-stem">${esc(q.stem)}</div>
        <div class="question-help">${esc(q.help)}</div>
        <div class="choice-list">
          ${choices}
        </div>
      </section>
    `;
  }).join("");

  app.innerHTML = `
    <a class="back-link" href="../index.html">← Back to Hub</a>

    <section class="hero">
      <div class="kicker">Legend Mastery Series • American Studies</div>
      <h1>${TEST_TITLE}</h1>
      <p class="sub">Complete all questions, then submit. Your score ticket will include time, date, and attempt number.</p>
    </section>

    <section class="panel-card" style="margin-top:20px">
      <div class="meta-grid">
        <div class="meta-card">
          <div class="meta-label">Student</div>
          <div class="meta-value">${esc(state.studentName)}</div>
        </div>
        <div class="meta-card">
          <div class="meta-label">Date</div>
          <div class="meta-value">${esc(state.dateStamp)}</div>
        </div>
        <div class="meta-card">
          <div class="meta-label">Start Time</div>
          <div class="meta-value">${esc(state.startTimeStamp)}</div>
        </div>
        <div class="meta-card">
          <div class="meta-label">Attempt Number</div>
          <div class="meta-value">${state.attemptNumber}</div>
        </div>
        <div class="meta-card">
          <div class="meta-label">Live Testing Time</div>
          <div class="meta-value" id="liveTimer">${formatElapsed(state.elapsedSeconds)}</div>
        </div>
      </div>
    </section>

    <section class="test-list">
      ${questionHtml}
    </section>

    <div class="submit-bar">
      <div class="submit-panel">
        <div class="left">
          <span class="mini-pill">Student: ${esc(state.studentName)}</span>
          <span class="mini-pill">Attempt: ${state.attemptNumber}</span>
          <span class="mini-pill">Timer: <span id="liveTimerBottom">${formatElapsed(state.elapsedSeconds)}</span></span>
        </div>
        <div class="right">
          <button class="btn" onclick="submitTest()">Submit Recovery Test</button>
        </div>
      </div>
    </div>
  `;

  if(state.timerInterval){
    clearInterval(state.timerInterval);
  }

  state.timerInterval = setInterval(() => {
    state.elapsedSeconds = Math.floor((Date.now() - state.startEpoch) / 1000);
    const top = document.getElementById("liveTimer");
    const bottom = document.getElementById("liveTimerBottom");
    if(top) top.textContent = formatElapsed(state.elapsedSeconds);
    if(bottom) bottom.textContent = formatElapsed(state.elapsedSeconds);
  }, 1000);
}

function getSelectedAnswers(index){
  const q = questions[index];
  const inputs = Array.from(document.querySelectorAll(`input[name="q_${index}"]:checked`));
  if(q.type === "single"){
    return inputs[0] ? inputs[0].value : null;
  }
  return inputs.map(i => i.value).sort();
}

function arraysEqual(a, b){
  if(a.length !== b.length) return false;
  for(let i = 0; i < a.length; i++){
    if(a[i] !== b[i]) return false;
  }
  return true;
}

function gradeTest(){
  let correctCount = 0;
  const missed = [];

  questions.forEach((q, idx) => {
    const selected = getSelectedAnswers(idx);
    let isCorrect = false;

    if(q.type === "single"){
      isCorrect = selected === q.answer;
    } else {
      if(Array.isArray(selected)){
        isCorrect = arraysEqual(selected, [...q.answers].sort());
      }
    }

    if(isCorrect){
      correctCount++;
    } else {
      missed.push({
        number: idx + 1,
        stem: q.stem,
        correct: q.type === "single" ? q.answer : q.answers.join(", "),
        explain: q.explain
      });
    }
  });

  return {
    correctCount,
    total: questions.length,
    percent: Math.round((correctCount / questions.length) * 100),
    missed
  };
}

async function postToSheet(payload){
  if(!SHEET_ENDPOINT) return { skipped: true };
  try{
    await fetch(SHEET_ENDPOINT, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    return { ok: true };
  }catch(err){
    return { ok: false, error: String(err) };
  }
}

async function submitTest(){
  if(state.submitted) return;

  const now = new Date();
  state.endTimeStamp = formatTime(now);
  state.elapsedSeconds = Math.floor((Date.now() - state.startEpoch) / 1000);

  if(state.timerInterval){
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }

  const results = gradeTest();
  state.submitted = true;

  const payload = {
    testTitle: TEST_TITLE,
    studentName: state.studentName,
    date: state.dateStamp,
    startTime: state.startTimeStamp,
    endTime: state.endTimeStamp,
    elapsedTime: formatElapsed(state.elapsedSeconds),
    elapsedSeconds: state.elapsedSeconds,
    attemptNumber: state.attemptNumber,
    correct: results.correctCount,
    total: results.total,
    percent: results.percent,
    missedCount: results.missed.length
  };

  await postToSheet(payload);

  renderResults(results);
}
