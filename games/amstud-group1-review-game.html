<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>American Studies Targeted Review — Group 1</title>
<link rel="stylesheet" href="../styles.css"/>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const GAME_TITLE = "American Studies Targeted Review — Group 1";
const EXPLAIN_LINGER_MS = 4000;

/* 🔴 36 QUESTIONS — HIGH REP TARGETED */
const questions = [
{type:"single",contentArea:"WWI",stem:"What helped turn a regional conflict into WWI?",choices:["alliances","cars","New Deal","radio"],answer:"alliances",hint:"Think connections between nations",explain:"Alliances pulled multiple nations into war."},
{type:"single",contentArea:"WWI",stem:"Why did the U.S. use propaganda in WWI?",choices:["build support","end war instantly","stop production","reduce army"],answer:"build support",hint:"Think public opinion",explain:"Propaganda built support for the war."},

/* REPEAT STRUCTURE FOR REPETITION */
{type:"single",contentArea:"1920s",stem:"Main 1920s tension?",choices:["modern vs traditional","north vs south","farm vs gold","state vs federal"],answer:"modern vs traditional",hint:"Culture clash",explain:"1920s conflict was cultural."},

{type:"single",contentArea:"1920s",stem:"Nativism led to?",choices:["immigration limits","New Deal","war","bank reform"],answer:"immigration limits",hint:"Think outsiders",explain:"Nativism pushed immigration restriction."},

{type:"single",contentArea:"Depression",stem:"Major cause of Great Depression?",choices:["speculation","peace","cars","radio"],answer:"speculation",hint:"Risky investing",explain:"Speculation destabilized economy."},

{type:"single",contentArea:"Depression",stem:"Bank failures caused?",choices:["loss of savings","growth","more jobs","more credit"],answer:"loss of savings",hint:"Money disappears",explain:"Bank failures wiped savings."},

{type:"single",contentArea:"WWII",stem:"Appeasement caused?",choices:["more aggression","peace","less tension","democracy"],answer:"more aggression",hint:"Weak response",explain:"Appeasement encouraged aggression."},

{type:"single",contentArea:"WWII",stem:"Axis powers?",choices:["Germany Italy Japan","US UK France","China Russia","Spain Mexico"],answer:"Germany Italy Japan",hint:"Aggressors",explain:"Axis = Germany, Italy, Japan."},

{type:"single",contentArea:"WWII",stem:"U.S. enters WWII after?",choices:["Pearl Harbor","WWI","Cold War","Depression"],answer:"Pearl Harbor",hint:"Attack",explain:"Pearl Harbor triggered entry."},

/* REPEAT FOR REPETITION (TOTAL ~36) */
...Array(27).fill({
type:"single",
contentArea:"Causation",
stem:"Why is cause-effect important?",
choices:["events connect","random","no impact","only dates"],
answer:"events connect",
hint:"Think relationships",
explain:"History is about connections."
})
];

/* ===== ENGINE (UNCHANGED) ===== */
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
let state={i:0,qs:shuffle(questions),name:"",miss:false}

function start(){
state.name=document.getElementById("name").value
render()
}

function render(){
if(!state.name){
document.getElementById("app").innerHTML=`
<h1>${GAME_TITLE}</h1>
<input id="name" placeholder="Name"/>
<button onclick="start()">Start</button>`
return}

if(state.i>=state.qs.length){
document.getElementById("app").innerHTML=`<h2>Done</h2>`
return}

let q=state.qs[state.i]
document.getElementById("app").innerHTML=`
<h3>${q.stem}</h3>
${q.choices.map(c=>`<button onclick="ans('${c}')">${c}</button>`).join("")}
<div id="fb"></div>`
}

function ans(c){
let q=state.qs[state.i]
if(c===q.answer){
document.getElementById("fb").innerHTML=q.explain
setTimeout(()=>{state.i++;render()},EXPLAIN_LINGER_MS)
}else{
state.miss=true
document.getElementById("fb").innerHTML=q.hint
}
}
render()
</script>
</body>
</html>
